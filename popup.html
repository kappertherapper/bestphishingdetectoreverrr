<!DOCTYPE html>
<html>
<head>
  <title>best phishing Detector everrrr</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: Arial, sans-serif;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
    }
    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .popup-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #222;
    }
    #close-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
      padding: 0;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.15s, color 0.15s;
    }
    #close-btn:hover { background: #fee; color: #e74c3c; }
    .popup-body { padding: 16px; }
    .domain-row {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f7f8fa;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 14px;
    }
    .domain-text { font-size: 12px; color: #999; }
    .domain-name { font-size: 12px; font-weight: 600; color: #3498db; font-family: monospace; }
    .status-safe {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 0 6px;
    }
    .status-icon-safe {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #eafaf1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .status-label { font-size: 13px; font-weight: 700; }
    .status-label.safe { color: #27ae60; }
    .status-sub { font-size: 11px; color: #bbb; }
    .status-warn {
      border-radius: 10px;
      background: #fff9f9;
      border: 1px solid #fde8e8;
      padding: 14px;
    }
    .warn-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .warn-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #fde8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .warn-title { font-size: 13px; font-weight: 700; color: #c0392b; }
    .warn-sub { font-size: 11px; color: #e57373; margin-top: 3px; }
    .match-row {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #f5c6c6;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .match-label { font-size: 10px; color: #bbb; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
    .match-domain { font-size: 13px; font-weight: 600; color: #222; font-family: monospace; }
    .match-pill {
      background: #fde8e8;
      color: #c0392b;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-title">
      <svg id="header-shield" viewBox="0 0 20 20" fill="none" width="18" height="18">
        <path d="M10 2L3 5v5c0 4.4 3 8.1 7 9 4-0.9 7-4.6 7-9V5L10 2z" fill="#e8f5e9" stroke="#27ae60" stroke-width="1.2"/>
      </svg>
      best phishing Detector everrrr
    </div>
    <button id="close-btn">
      <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>
  </div>
  <div class="popup-body">
    <div class="domain-row">
      <svg viewBox="0 0 14 14" fill="none" width="13" height="13" style="flex-shrink:0">
        <circle cx="7" cy="7" r="6" stroke="#ccc" stroke-width="1"/>
        <path d="M7 1c-1.5 2-2 4-2 6s.5 4 2 6M7 1c1.5 2 2 4 2 6s-.5 4-2 6M1 7h12" stroke="#ccc" stroke-width="1"/>
      </svg>
      <br>
      <br>
      <span class="domain-text">Checking</span>
      <span class="domain-name" id="domain-display">...</span>
    </div>
    <br>
    <br>
    <div id="results">
      <div class="status-safe">
        <div class="status-icon-safe">
          <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
            <circle cx="12" cy="12" r="10" stroke="#ddd" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="status-label safe">Scanning…</div>
        <div class="status-sub">Please wait</div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
